<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deletar Tarefa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Fundo escuro dramático */
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #e0e0e0;
        }
        
        .container {
            max-width: 500px;
            background: #1e1e1e; /* Card dark */
            border-radius: 10px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7);
            overflow: hidden;
            border: 1px solid #333;
        }
        
        header {
            /* Vermelho mais denso para o header dark */
            background: #8b0000;
            color: white;
            padding: 30px;
            text-align: center;
            border-bottom: 2px solid #660000;
        }
        
        header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .content {
            padding: 30px;
            text-align: center;
        }
        
        .warning-icon {
            font-size: 3em;
            margin-bottom: 20px;
            color: #ff4d4d; /* Ícone vibrante no fundo escuro */
        }
        
        .warning-message {
            /* Estilo de alerta para Dark Mode */
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid #dc3545;
            color: #ff8080;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        
        .tarefa-info {
            background: #252525;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 4px solid #dc3545;
        }
        
        .tarefa-titulo {
            font-size: 1.3em;
            font-weight: bold;
            color: #ffffff;
            word-break: break-word;
        }
        
        .tarefa-data {
            font-size: 0.9em;
            color: #777;
            margin-top: 10px;
        }
        
        .actions {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        
        .btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        
        .btn-danger:hover {
            background: #ff4d4d;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(220, 53, 69, 0.4);
        }
        
        .btn-secondary {
            background: #333;
            color: #bbb;
            border: 1px solid #444;
        }
        
        .btn-secondary:hover {
            background: #444;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🗑️ Deletar Tarefa</h1>
        </header>
        
        <div class="content">
            <div class="warning-icon">⚠️</div>
            
            <div class="warning-message">
                <strong>Atenção!</strong> Esta ação não pode ser desfeita. Tem certeza que deseja deletar esta tarefa?
            </div>
            
            <div class="tarefa-info">
                <div class="tarefa-titulo">{{ tarefa.titulo }}</div>
                {% if tarefa.descricao %}
                    <div class="tarefa-data" style="margin-top: 10px;">
                        {{ tarefa.descricao|truncatewords:20 }}
                    </div>
                {% endif %}
                <div class="tarefa-data">
                    Criada em: {{ tarefa.data_criacao|date:"d/m/Y H:i" }}
                </div>
            </div>
            
            <form method="post">
                {% csrf_token %}
                <div class="actions">
                    <button type="submit" class="btn btn-danger">🗑️ Sim, Deletar</button>
                    <a href="{% url 'detalhe_tarefa' tarefa.pk %}" class="btn btn-secondary">❌ Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
