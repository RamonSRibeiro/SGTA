<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atualizar Tarefa</title>
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        /* Fundo escuro profundo com leve gradiente */
        background: radial-gradient(circle at top, #1e1e2e 0%, #121212 100%);
        min-height: 100vh;
        padding: 20px;
        color: #e0e0e0;
    }
    
    .container {
        max-width: 600px;
        margin: 0 auto;
        /* Card em tom grafite */
        background: #1e1e1e;
        border-radius: 10px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        overflow: hidden;
        border: 1px solid #333;
    }
    
    header {
        /* Gradiente dark para o header */
        background: linear-gradient(135deg, #2d2d44 0%, #1e1e1e 100%);
        color: #ffffff;
        padding: 30px;
        text-align: center;
        border-bottom: 1px solid #333;
    }
    
    header h1 {
        font-size: 2em;
        letter-spacing: 1px;
    }
    
    .content {
        padding: 30px;
    }
    
    .form-group {
        margin-bottom: 20px;
    }
    
    label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
        color: #bbb;
    }
    
    /* Estilização dos Inputs Dark */
    input[type="text"],
    input[type="date"],
    input[type="number"],
    textarea,
    select {
        width: 100%;
        padding: 12px;
        background-color: #2a2a2a;
        border: 1px solid #444;
        border-radius: 5px;
        font-size: 1em;
        font-family: inherit;
        color: #ffffff;
        transition: all 0.3s ease;
    }
    
    /* Ajuste para o ícone do calendário no input date em browsers webkit */
    input[type="date"]::-webkit-calendar-picker-indicator {
        filter: invert(1);
    }

    input[type="text"]:focus,
    input[type="date"]:focus,
    input[type="number"]:focus,
    textarea:focus,
    select:focus {
        outline: none;
        border-color: #764ba2;
        background-color: #333;
        box-shadow: 0 0 0 3px rgba(118, 75, 162, 0.2);
    }
    
    textarea {
        resize: vertical;
        min-height: 120px;
    }
    
    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }
    
    .checkbox-group {
        display: flex;
        align-items: center;
        gap: 10px;
    }
    
    input[type="checkbox"] {
        width: 18px;
        height: 18px;
        cursor: pointer;
        accent-color: #764ba2; /* Cor do check */
    }
    
    .checkbox-group label {
        margin: 0;
        cursor: pointer;
    }
    
    .actions {
        display: flex;
        gap: 10px;
        margin-top: 30px;
    }
    
    .btn {
        flex: 1;
        padding: 12px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 1em;
        font-weight: 600;
        transition: all 0.3s ease;
    }
    
    .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
    }
    
    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4);
        filter: brightness(1.1);
    }
    
    .btn-secondary {
        background: #333;
        color: #ccc;
        border: 1px solid #444;
    }
    
    .btn-secondary:hover {
        background: #444;
        color: #fff;
    }
    
    .help-text {
        font-size: 0.85em;
        color: #777;
        margin-top: 5px;
    }
</style>
</head>
<body>
    <div class="container">
        <header>
            <h1>✏️ Atualizar Tarefa</h1>
        </header>
        
        <div class="content">
            <form method="post">
                {% csrf_token %}
                
                <div class="form-group">
                    <label for="titulo">Título da Tarefa *</label>
                    <input 
                        type="text" 
                        id="titulo" 
                        name="titulo" 
                        required 
                        value="{{ tarefa.titulo }}"
                    >
                </div>
                
                <div class="form-group">
                    <label for="descricao">Descrição</label>
                    <textarea 
                        id="descricao" 
                        name="descricao"
                    >{{ tarefa.descricao }}</textarea>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="status">Status</label>
                        <select id="status" name="status">
                            <option value="pendente" {% if tarefa.status == 'pendente' %}selected{% endif %}>
                                Pendente
                            </option>
                            <option value="em_progresso" {% if tarefa.status == 'em_progresso' %}selected{% endif %}>
                                Em Progresso
                            </option>
                            <option value="concluida" {% if tarefa.status == 'concluida' %}selected{% endif %}>
                                Concluída
                            </option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="prioridade">Prioridade</label>
                        <select id="prioridade" name="prioridade">
                            <option value="1" {% if tarefa.prioridade == 1 %}selected{% endif %}>1 - Baixa</option>
                            <option value="2" {% if tarefa.prioridade == 2 %}selected{% endif %}>2 - Média</option>
                            <option value="3" {% if tarefa.prioridade == 3 %}selected{% endif %}>3 - Alta</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="data_vencimento">Data de Vencimento</label>
                    <input 
                        type="date" 
                        id="data_vencimento" 
                        name="data_vencimento"
                        value="{% if tarefa.data_vencimento %}{{ tarefa.data_vencimento|date:'Y-m-d' }}{% endif %}"
                    >
                </div>
                
                <div class="form-group">
                    <label for="usuario_responsavel">Responsável</label>
                    <select id="usuario_responsavel" name="usuario_responsavel">
                        <option value="">-- Sem responsável --</option>
                        {% for usuario in usuarios %}
                            <option value="{{ usuario.id }}" {% if tarefa.usuario_responsavel.id == usuario.id %}selected{% endif %}>
                                {{ usuario.nome }} ({{ usuario.email }})
                            </option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="form-group checkbox-group">
                    <input 
                        type="checkbox" 
                        id="concluida" 
                        name="concluida"
                        {% if tarefa.concluida %}checked{% endif %}
                    >
                    <label for="concluida">Marcar como concluída</label>
                </div>
                
                <div class="actions">
                    <button type="submit" class="btn btn-primary">💾 Atualizar Tarefa</button>
                    <a href="{% url 'detalhe_tarefa' tarefa.pk %}" class="btn btn-secondary">❌ Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
